name: '🔧 integration'

on:
  pull_request:
    types: ['opened', 'reopened', 'synchronize', 'edited']

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  integration:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: '☁️ checkout repository'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: '📝 lint pull-request title'
        uses: amannn/action-semantic-pull-request@v6

      - name: '🛠️ setup pnpm'
        uses: pnpm/action-setup@v4

      - name: '🔧 setup node'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: '🔼 update rust'
        run: rustup update ${{ matrix.toolchain }} && rustup default stable

      - name: '💿 cargo cache'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ./tauri/target
          key: ${{ runner.os }}-cargo-pr-${{ github.head_ref || github.ref_name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pr-${{ github.head_ref || github.ref_name }}-
            ${{ runner.os }}-cargo-main-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-main-

      - name: '📦 install apt packages'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            pkg-config libgtk-3-dev libayatana-appindicator3-dev
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
            libwebkit2gtk-4.1-dev librsvg2-dev libcairo2-dev
            libpango1.0-dev libharfbuzz-dev libatk1.0-dev
            libgdk-pixbuf-2.0-dev libgstreamer1.0-dev
            libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base
            gstreamer1.0-plugins-good patchelf
          version: 3
          execute_install_scripts: true

      - name: '📦 install pnpm packages'
        run: pnpm install --frozen-lockfile

      - name: '🔎 check'
        run: pnpm check

      - name: '📦 build'
        run: pnpm tauri build
